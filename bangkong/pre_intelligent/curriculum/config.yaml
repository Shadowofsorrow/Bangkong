# Curriculum Learning Configuration
curriculum:
  # General settings
  default_num_samples: 1000
  default_difficulty_range: [1, 5]
  max_performance_history: 10
  performance_window_size: 5
  
  # Task difficulty settings
  difficulty:
    initial: 1
    max: 5
    increment: 0.1
    competence_threshold: 0.8
  
  # Task distributions
  task_distributions:
    default:
      arithmetic_chain: 0.25
      logic_chain: 0.20
      planning: 0.20
      causal_reasoning: 0.15
      analogical_reasoning: 0.10
      spatial_reasoning: 0.10
    
    early_stage:
      arithmetic_chain: 0.30
      logic_chain: 0.20
      planning: 0.20
      causal_reasoning: 0.15
      analogical_reasoning: 0.10
      spatial_reasoning: 0.05
    
    middle_stage:
      arithmetic_chain: 0.25
      logic_chain: 0.15
      planning: 0.15
      causal_reasoning: 0.20
      analogical_reasoning: 0.15
      spatial_reasoning: 0.10
    
    advanced_stage:
      arithmetic_chain: 0.20
      logic_chain: 0.10
      planning: 0.10
      causal_reasoning: 0.20
      analogical_reasoning: 0.20
      spatial_reasoning: 0.20
  
  # Task-specific settings
  arithmetic_chain:
    base_min_operations: 3
    max_operations_limit: 8
    max_number_value: 20
  
  logic_chain:
    base_min_statements: 3
    max_statements_limit: 6
  
  planning:
    base_min_steps: 3
    max_steps_limit: 7
  
  causal_reasoning:
    base_min_chain_length: 2
    max_chain_length_limit: 5
  
  analogical_reasoning:
    base_min_analogies: 2
    max_analogies_limit: 4
  
  spatial_reasoning:
    base_min_objects: 3
    max_objects_limit: 6
  
  # Demonstration settings
  demo:
    num_samples: 100
    difficulty_range: [1, 3]
    num_curriculum_stages: 3
    base_accuracy: 0.6
    accuracy_increment: 0.04
    scheduler_base_accuracy: 0.7
    scheduler_accuracy_increment: 0.05
  
  # Data for tasks
  task_data:
    planning:
      actions: ["move", "pick", "place", "open", "close", "turn_on", "turn_off"]
      objects: ["box", "key", "door", "light", "book", "cup", "phone"]
      locations: ["kitchen", "bedroom", "living_room", "office", "bathroom"]
    
    causal_reasoning:
      patterns: [
        ["rain", "wet ground"],
        ["studying", "better grades"],
        ["exercise", "fitness"],
        ["sleep", "energy"],
        ["practice", "improvement"]
      ]
    
    analogical_reasoning:
      analogies: [
        ["eye", "camera", "see", "capture"],
        ["ear", "microphone", "hear", "record"],
        ["heart", "pump", "pump blood", "pump liquid"],
        ["brain", "computer", "think", "process"],
        ["stomach", "mixer", "digest food", "mix ingredients"]
      ]
    
    spatial_reasoning:
      shapes: ["square", "circle", "triangle", "rectangle", "pentagon"]
      positions: ["above", "below", "left of", "right of", "inside", "outside"]
    
    logic_chain:
      variables: ["A", "B", "C", "D", "E", "F"]