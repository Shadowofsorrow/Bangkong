defaults:
  - default

model:
  name: "code-llm"
  architecture: "gpt2"
  domain: "code"
  size: "medium"
  vocab_size: 50257
  hidden_size: 1024
  num_layers: 24
  num_heads: 16

data:
  preprocessing:
    min_text_length: 100
    max_text_length: 50000

training:
  max_epochs: 5
  learning_rate: 2e-5

hardware:
  use_gpu: "true"
  fp16: "true"