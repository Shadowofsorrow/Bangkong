defaults:
  - default

model:
  name: "reasoning-llm-enhanced"
  architecture: "gpt2"
  size: "large"
  modality: "text"
  domain: "reasoning"
  sequence_length: 4096
  max_sequence_length: 32768
  initialization_strategy: "structured"
  prior_knowledge: "reasoning"

training:
  max_epochs: 5
  learning_rate: 3e-5
  peft_type: "lora"
  lora_rank: 16

hardware:
  use_gpu: "true"
  fp16: "true"