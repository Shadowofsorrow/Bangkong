model:
  name: "test-model"
  architecture: "gpt2"
  size: "tiny"
  vocab_size: 50257
  hidden_size: 128
  num_layers: 2
  num_heads: 4
  sequence_length: 128

training:
  max_epochs: 2
  learning_rate: 5e-5
  warmup_steps: 10
  save_steps: 50
  logging_steps: 10
  gradient_accumulation_steps: 1
  weight_decay: 0.01
  adam_epsilon: 1e-8
  max_grad_norm: 1.0
  batch_size: 2
  early_stopping_patience: 3
  progress_leave: false
  epoch_progress_leave: true

data:
  preprocessing:
    min_text_length: 10
    max_text_length: 500
    deduplicate: true
    filter_low_quality: true

hardware:
  use_gpu: "false"
  fp16: "false"
  num_workers: 0
  batch_size: 2

monitoring:
  backend: "none"
  log_level: "INFO"
  log_file: "./logs/test_training.log"

paths:
  models: "./models"
  logs: "./logs"
  checkpoints: "./checkpoints"
  outputs: "./outputs"