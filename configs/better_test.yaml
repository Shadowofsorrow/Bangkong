model:
  name: "better-test-model"
  architecture: "gpt2"
  size: "small"
  vocab_size: 50257
  hidden_size: 512
  num_layers: 6
  num_heads: 8
  sequence_length: 256

training:
  max_epochs: 5
  learning_rate: 1e-4
  warmup_steps: 50
  save_steps: 100
  logging_steps: 10
  gradient_accumulation_steps: 1
  weight_decay: 0.01
  adam_epsilon: 1e-8
  max_grad_norm: 1.0
  batch_size: 4
  early_stopping_patience: 3
  progress_leave: false
  epoch_progress_leave: true

data:
  preprocessing:
    min_text_length: 20
    max_text_length: 1000
    deduplicate: true
    filter_low_quality: true

hardware:
  use_gpu: "false"
  fp16: "false"
  num_workers: 0
  batch_size: 4

monitoring:
  backend: "none"
  log_level: "INFO"
  log_file: "./logs/better_test_training.log"

paths:
  models: "./models"
  logs: "./logs"
  checkpoints: "./checkpoints"
  outputs: "./outputs"