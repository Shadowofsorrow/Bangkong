defaults:
  - default

model:
  name: "long-context-llm"
  architecture: "gpt2"
  size: "large"
  sequence_length: 100000
  max_sequence_length: 2000000
  attention_block_size: 128
  attention_window_size: 1024

data:
  preprocessing:
    min_text_length: 1000
    max_text_length: 500000

training:
  max_epochs: 3
  learning_rate: 1e-5
  batch_size: 1

hardware:
  use_gpu: "true"
  fp16: "true"
  max_memory_gb: 24