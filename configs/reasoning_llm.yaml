defaults:
  - default

model:
  name: "reasoning-llm"
  architecture: "gpt2"
  size: "medium"
  modality: "text"
  domain: "general"
  sequence_length: 2048
  initialization_strategy: "structured"
  prior_knowledge: "reasoning"

training:
  max_epochs: 5
  learning_rate: 3e-5

hardware:
  use_gpu: "true"
  fp16: "true"