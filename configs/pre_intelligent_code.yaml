defaults:
  - default

model:
  name: "pre-intelligent-code"
  architecture: "gpt2"
  size: "large"
  modality: "text"
  domain: "code"
  sequence_length: 4096
  max_sequence_length: 65536
  initialization_strategy: "pre_intelligent"
  prior_knowledge: "code"

training:
  max_epochs: 5
  learning_rate: 3e-5
  peft_type: "lora"
  lora_rank: 16

hardware:
  use_gpu: "true"
  fp16: "true"