defaults:
  - default

model:
  size: "${BANGKONG_MODEL_SIZE:-small}"

training:
  max_epochs: ${BANGKONG_MAX_EPOCHS:-5}
  learning_rate: 1e-4
  distillation_temperature: ${BANGKONG_DISTILLATION_TEMPERATURE:-3.0}
  distillation_alpha: ${BANGKONG_DISTILLATION_ALPHA:-0.7}

hardware:
  use_gpu: "${BANGKONG_USE_GPU:-auto}"
  fp16: "${BANGKONG_FP16:-auto}"

monitoring:
  log_level: "${BANGKONG_LOG_LEVEL:-DEBUG}"

deployment:
  default_target: "${BANGKONG_DEPLOYMENT_TARGET:-local}"