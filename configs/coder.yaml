defaults:
  - default

model:
  name: "coder-llm"
  architecture: "gpt2"
  size: "large"
  modality: "text"
  domain: "code"
  sequence_length: 8192
  max_sequence_length: 16384
  vocab_size: 50257

training:
  max_epochs: 5
  learning_rate: 2e-5
  peft_type: "lora"
  lora_rank: 16

data:
  preprocessing:
    min_text_length: 100
    max_text_length: 50000

hardware:
  use_gpu: "true"
  fp16: "true"